# wrangler.toml — Cloudflare Workers configuration
#
# Deploy:  npm run deploy
# Dev:     npm run cf:dev
# Secrets: npx wrangler secret put SUPABASE_URL  (etc — see .env.example)
#
# Live URL (auto-assigned by Cloudflare):
#   https://founder-control-room.<your-cf-subdomain>.workers.dev
#
# To add a custom domain later:
#   1. Add your domain to Cloudflare
#   2. Replace [env.production] below with:
#      route = { pattern = "api.yourdomain.com/*", custom_domain = true }

name       = "founder-control-room"
main       = "src/worker/cf-entry.ts"
compatibility_date = "2026-07-11"
compatibility_flags = ["nodejs_compat"]

# workers.dev subdomain is enabled by default — no route config needed.
# Cloudflare will assign:
#   https://founder-control-room.<your-subdomain>.workers.dev

# ---------------------------------------------------------------------------
# Vars (non-secret, safe to commit)
# ---------------------------------------------------------------------------

[vars]
NODE_ENV = "production"

# ---------------------------------------------------------------------------
# Secrets (DO NOT commit values — use `wrangler secret put`)
# ---------------------------------------------------------------------------
# Required secrets:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put GITHUB_WEBHOOK_SECRET
#   wrangler secret put GITHUB_APP_ID
#   wrangler secret put GITHUB_PRIVATE_KEY
#   wrangler secret put FOUNDER_ALLOWED_ORIGINS
#   wrangler secret put FOUNDER_API_URL

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------

[observability]
enabled = true
head_sampling_rate = 1
