name = "founder-control-room"
main = "src/worker/cf-entry.ts"
compatibility_date = "2025-06-01"
compatibility_flags = [
  "nodejs_compat",
  "enable_nodejs_http_modules",
  "enable_nodejs_http_server_modules",
]

[observability]
enabled = true

# ---------------------------------------------------------------------------
# Non-secret vars — committed here, safe to expose
# ---------------------------------------------------------------------------
# NOTE: Founder Control Room deploys to Vercel.
#       Se'kret Bip does NOT use Vercel (it has its own separate infra).
#       ORIGIN_URL must point at the Vercel deployment for this repo only.
# ---------------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"
# Replace with your actual Vercel deployment URL after first deploy:
ORIGIN_URL = "https://founder-control-room.vercel.app"

# ---------------------------------------------------------------------------
# Secrets — set via `wrangler secret put <NAME>` (never committed)
# ---------------------------------------------------------------------------
# wrangler secret put GITHUB_WEBHOOK_SECRET
# wrangler secret put SUPABASE_URL
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# wrangler secret put SUPABASE_PUBLISHABLE_KEY
# wrangler secret put GITHUB_TOKEN
# wrangler secret put FOUNDER_ALLOWED_ORIGINS
# wrangler secret put FOUNDER_API_URL

[triggers]
crons = ["* * * * *"]
