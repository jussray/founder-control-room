name = "founder-control-room"
main = "src/workers/deletion-queue-worker.ts"
compatibility_date = "2024-09-23"

[vars]
ENVIRONMENT = "production"

[[triggers.crons]]
cron = "0 */6 * * *"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "YOUR_SESSIONS_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "FEATURE_FLAGS_KV"
id = "YOUR_FEATURE_FLAGS_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "FCR_BACKUPS"
bucket_name = "fcr-backups"

[headers]
  [headers."/*"]
    Content-Security-Policy = "default-src 'self'; script-src 'self'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Secrets (wrangler secret put <NAME>):
# SUPABASE_SERVICE_ROLE_KEY
# CF_API_TOKEN
# CF_ACCOUNT_ID
# CF_SESSIONS_KV_NAMESPACE_ID
# CF_FEATURE_FLAGS_KV_NAMESPACE_ID
