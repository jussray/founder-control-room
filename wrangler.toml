name = "founder-control-room"
main = "src/worker/cf-entry.ts"
compatibility_date = "2025-06-01"
compatibility_flags = [
  "nodejs_compat",
  "enable_nodejs_http_modules",
  "enable_nodejs_http_server_modules",
]
workers_dev = false
preview_urls = false

[observability]
enabled = true

# This Worker (src/worker/cf-entry.ts) is the whole application — Express
# running behind Cloudflare's Node HTTP adapter — not a thin relay in front
# of a separate Next.js/Vercel deploy. That relay design (src/worker/index.ts,
# ORIGIN_URL) belongs to an earlier, unbuilt prototype path and is excluded
# from this build (see tsconfig.json's exclude list); it is not read by
# cf-entry.ts and must not be confused with it.
#
# The API-subdomain Worker has its own config in wrangler.api.toml. The
# deletion-queue worker has its own config in wrangler.deletion-queue.toml.
# These Workers must not share a name, route, or cron configuration.

[[routes]]
pattern = "foundercontrolroom.org"
custom_domain = true

# ---------------------------------------------------------------------------
# Non-secret vars — committed here, safe to expose
# ---------------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"
MCP_EXA_URL = "https://mcp.exa.ai/mcp"
MCP_RESEND_URL = "https://mcp.resend.com/mcp"

# ---------------------------------------------------------------------------
# Secrets — set in the founder-control-room Worker secret store, never commit
# ---------------------------------------------------------------------------
# Required service bindings:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   SUPABASE_PUBLISHABLE_KEY
#   GITHUB_WEBHOOK_SECRET
#   FOUNDER_ALLOWED_ORIGINS            # https://foundercontrolroom.org
#   FOUNDER_API_URL                    # https://foundercontrolroom.org
#
# Required GitHub authentication, choose one path:
#   GITHUB_APP_ID + GITHUB_PRIVATE_KEY  # preferred production path
#   GITHUB_TOKEN                        # local/development fallback
#
# External code-use discovery and hourly digest:
#   MCP_GITHUB_URL                     # GitHub MCP endpoint
#   MCP_GITHUB_TOKEN                   # read-only repository discovery token
#   RESEND_API_KEY                     # sender and Resend MCP bearer credential
#   EXTERNAL_USE_EMAIL_FROM            # sender on a Resend-verified domain
#
# Optional repository ingestion:
#   REPOSITORY_INGEST_SECRET
#   REPOSITORY_INGEST_SECRET_<NORMALIZED_PROJECT_SLUG>
#
# Founder Signal Engine review-only bridge:
#   FOUNDER_SIGNAL_ENGINE_MCP_TOKEN
#   ZAPIER_FOUNDER_SIGNAL_ENGINE_HOOK_URL
# Optional:
#   FOUNDER_SIGNAL_ENGINE_HOOK_TIMEOUT_MS

[triggers]
crons = ["* * * * *"]
