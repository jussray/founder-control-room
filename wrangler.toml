name = "founder-control-room"
main = "src/worker/cf-entry.ts"
compatibility_date = "2025-06-01"
compatibility_flags = [
  "nodejs_compat",
  "enable_nodejs_http_modules",
  "enable_nodejs_http_server_modules",
]

[observability]
enabled = true

# This Worker (src/worker/cf-entry.ts) is the whole application — Express
# running behind Cloudflare's Node HTTP adapter — not a thin relay in front
# of a separate Next.js/Vercel deploy. That relay design (src/worker/index.ts,
# ORIGIN_URL) belongs to an earlier, unbuilt prototype path and is excluded
# from this build (see tsconfig.json's exclude list); it is not read by
# cf-entry.ts and must not be confused with it.
#
# The deletion-queue worker (src/workers/deletion-queue-worker.ts) is a
# separate Cloudflare Worker — its own config lives in
# wrangler.deletion-queue.toml (`wrangler deploy --config
# wrangler.deletion-queue.toml`), not here. It must never share this file:
# a single wrangler.toml can only declare one `main`/`name` pair, and this
# one is the founder-control-room application itself.

[[routes]]
pattern = "foundercontrolroom.org"
custom_domain = true

# ---------------------------------------------------------------------------
# Non-secret vars — committed here, safe to expose
# ---------------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"

# ---------------------------------------------------------------------------
# Secrets — set via `wrangler secret put <NAME>` (never committed)
# ---------------------------------------------------------------------------
# wrangler secret put GITHUB_WEBHOOK_SECRET
# wrangler secret put SUPABASE_URL
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# wrangler secret put SUPABASE_PUBLISHABLE_KEY
# wrangler secret put GITHUB_APP_ID
# wrangler secret put GITHUB_PRIVATE_KEY
# wrangler secret put REPOSITORY_INGEST_SECRET
# wrangler secret put REPOSITORY_INGEST_SECRET_<NORMALIZED_PROJECT_SLUG>  # preferred per repo
# wrangler secret put FOUNDER_ALLOWED_ORIGINS   # https://foundercontrolroom.org
# wrangler secret put FOUNDER_API_URL           # https://foundercontrolroom.org
#
# Local/development fallback only:
# wrangler secret put GITHUB_TOKEN

[triggers]
crons = ["* * * * *"]
