<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Founder Control Room · Plugin Center</title>
  <style>
    :root { color-scheme: dark; --bg:#07111f; --panel:#111b2d; --line:#253755; --text:#edf4ff; --muted:#9eb1ce; --ok:#74f0a7; --warn:#ffd166; --danger:#ff6b7a; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top left, #17294a, var(--bg) 48rem); color: var(--text); }
    main { max-width: 1180px; margin: 0 auto; padding: 2rem; }
    header { display:flex; justify-content:space-between; gap:1rem; align-items:center; margin-bottom:1.5rem; }
    h1 { margin:0; font-size: clamp(2rem, 6vw, 4.5rem); letter-spacing:-0.05em; }
    h2 { margin:0 0 0.75rem; }
    a { color:#9cc9ff; }
    button { border:1px solid var(--line); background:#152743; color:var(--text); border-radius:999px; padding:0.6rem 0.9rem; cursor:pointer; }
    .muted { color: var(--muted); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:1rem; }
    .panel, .card { border:1px solid var(--line); background: color-mix(in srgb, var(--panel), transparent 4%); border-radius:18px; padding:1rem; box-shadow: 0 24px 80px rgba(0,0,0,0.22); }
    .summary { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .metric { font-size:2rem; font-weight:800; }
    .badge { display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:999px; padding:0.2rem 0.5rem; font-size:0.75rem; margin-right:0.35rem; color:var(--muted); }
    .ok { color:var(--ok); }
    .warn { color:var(--warn); }
    .danger { color:var(--danger); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .stack { display:flex; flex-direction:column; gap:1rem; }
    .toolbar { display:flex; gap:0.75rem; flex-wrap:wrap; align-items:center; }
    .error { color:var(--danger); white-space:pre-wrap; }
    ul { padding-left:1.2rem; }
    small { color:var(--muted); }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <p class="muted">Founder Control Room</p>
        <h1>Plugin Center</h1>
        <p class="muted">Connect tools. Gate power. Preserve proof.</p>
      </div>
      <div class="toolbar">
        <a href="/control-room/"><button type="button">Back to Control Room</button></a>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <section class="grid summary" id="summary"></section>
    <section class="panel" style="margin-top:1rem" id="contract"></section>

    <div class="grid" style="margin-top:1rem">
      <section class="panel">
        <h2>Registered connections</h2>
        <div class="stack" id="connections"></div>
      </section>
      <section class="panel">
        <h2>Temporary grants</h2>
        <div class="stack" id="grants"></div>
      </section>
    </div>

    <section class="panel" style="margin-top:1rem">
      <h2>Catalog</h2>
      <div class="grid" id="catalog"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'fcr_session';
    const nodes = {
      summary: document.getElementById('summary'),
      contract: document.getElementById('contract'),
      connections: document.getElementById('connections'),
      grants: document.getElementById('grants'),
      catalog: document.getElementById('catalog'),
      refresh: document.getElementById('refresh'),
    };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function session() {
      try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || 'null'); } catch { return null; }
    }

    async function api(path) {
      const current = session();
      if (!current?.access_token) throw new Error('No founder session found. Sign in through the main Control Room first.');
      const res = await fetch(path, { headers: { Authorization: `Bearer ${current.access_token}` } });
      const body = await res.json().catch(() => null);
      if (!res.ok) throw new Error(body?.error || `Request failed (${res.status})`);
      return body;
    }

    function riskClass(risk) {
      if (risk === 'critical' || risk === 'high') return 'danger';
      if (risk === 'medium') return 'warn';
      return 'ok';
    }

    function renderSummary(summary) {
      const items = [
        ['Installed', summary.installedConnections],
        ['Active', summary.activeConnections],
        ['Errors', summary.errorConnections],
        ['High risk', summary.highRiskConnections],
        ['Temp grants', summary.activeTemporaryGrants],
        ['Missing level', summary.missingAuthorityLevel],
      ];
      nodes.summary.innerHTML = items.map(([label, value]) => `<div class="panel"><div class="metric">${escapeHtml(value)}</div><div class="muted">${escapeHtml(label)}</div></div>`).join('');
    }

    function renderContract(contract) {
      nodes.contract.innerHTML = `
        <h2>${escapeHtml(contract.label)}</h2>
        <p>${escapeHtml(contract.purpose)}</p>
        <p class="muted">${escapeHtml(contract.enforcementNote)}</p>
        <ul>${(contract.principles || []).map((p) => `<li>${escapeHtml(p)}</li>`).join('')}</ul>
      `;
    }

    function renderConnections(connections) {
      nodes.connections.innerHTML = connections.length === 0 ? '<p class="muted">No plugin connections registered.</p>' : connections.map((connection) => `
        <div class="card">
          <div><span class="badge ${connection.status === 'active' ? 'ok' : connection.status === 'error' ? 'danger' : 'warn'}">${escapeHtml(connection.status)}</span><span class="badge ${riskClass(connection.risk)}">${escapeHtml(connection.risk)}</span>${connection.authorityLevel ? `<span class="badge">${escapeHtml(connection.authorityLevel)}</span>` : '<span class="badge warn">no level</span>'}</div>
          <h3>${escapeHtml(connection.catalogLabel || connection.type)}${connection.label ? ` · ${escapeHtml(connection.label)}` : ''}</h3>
          <p class="muted">${escapeHtml(connection.projectName || connection.projectSlug || 'Unknown project')}</p>
          ${(connection.capabilities || []).length ? `<p><small>${connection.capabilities.map(escapeHtml).join(', ')}</small></p>` : ''}
          ${connection.dataBoundary ? `<p class="muted">Boundary: ${escapeHtml(connection.dataBoundary)}</p>` : ''}
          ${connection.secretRef ? `<p class="muted">Secret ref: <span class="mono">${escapeHtml(connection.secretRef)}</span></p>` : ''}
        </div>
      `).join('');
    }

    function renderGrants(grants) {
      nodes.grants.innerHTML = grants.length === 0 ? '<p class="muted">No active temporary grants.</p>' : grants.map((grant) => `
        <div class="card">
          <span class="badge warn">${escapeHtml(grant.grantType)}</span>
          <h3 class="mono">${escapeHtml(grant.toolRule)}</h3>
          <p class="muted">${escapeHtml(grant.projectName || grant.projectSlug || 'Unknown project')} · expires ${escapeHtml(new Date(grant.expiresAt).toLocaleString())}</p>
          ${grant.usageLimit ? `<p>${escapeHtml(grant.usageLimit)}</p>` : ''}
          ${grant.reason ? `<p class="muted">Reason: ${escapeHtml(grant.reason)}</p>` : ''}
        </div>
      `).join('');
    }

    function renderCatalog(catalog) {
      nodes.catalog.innerHTML = catalog.map((plugin) => `
        <div class="card">
          <span class="badge">${escapeHtml(plugin.defaultAuthorityLevel)}</span>
          <h3>${escapeHtml(plugin.label)}</h3>
          <p class="muted">${escapeHtml(plugin.description)}</p>
          <p><small>${(plugin.capabilities || []).map((cap) => escapeHtml(cap.id)).join(', ')}</small></p>
          <p class="muted">${escapeHtml(plugin.secretsPolicy)}</p>
        </div>
      `).join('');
    }

    async function load() {
      try {
        nodes.contract.innerHTML = '<p class="muted">Loading Plugin Center…</p>';
        const data = await api('/plugin-center');
        renderSummary(data.summary || {});
        renderContract(data.contract || {});
        renderConnections(data.connections || []);
        renderGrants(data.temporaryGrants || []);
        renderCatalog(data.catalog || []);
      } catch (error) {
        nodes.contract.innerHTML = `<p class="error">${escapeHtml(error instanceof Error ? error.message : String(error))}</p>`;
      }
    }

    nodes.refresh.addEventListener('click', load);
    load();
  </script>
</body>
</html>
