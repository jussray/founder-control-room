name: One-shot project isolation test fix

on:
  push:
    branches:
      - fix/project-scoped-connection-write
    paths:
      - .github/workflows/one-shot-project-isolation-test-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/project-scoped-connection-write
          fetch-depth: 0

      - name: Update the existing integration mock for the scoped predicate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/http/routes/__tests__/projects.releases-connections.integration.test.ts')
          text = path.read_text()
          before = '''              eq: () => ({
                select: () => ({
                  single: () => Promise.resolve({ data: { id: 'conn-1', status: 'active', ...payload }, error: null }),
                }),
              }),'''
          after = '''              eq: (field: string, value: unknown) => {
                expect(field).toBe('id');
                expect(value).toBe('conn-1');
                return {
                  eq: (projectField: string, projectValue: unknown) => {
                    expect(projectField).toBe('project_id');
                    expect(projectValue).toBe('project-1');
                    return {
                      select: () => ({
                        single: () => Promise.resolve({ data: { id: 'conn-1', project_id: 'project-1', status: 'active', ...payload }, error: null }),
                      }),
                    };
                  },
                };
              },'''
          if text.count(before) != 1:
              raise SystemExit(f'Expected exactly one legacy update mock, found {text.count(before)}')
          path.write_text(text.replace(before, after, 1))
          PY

          rm .github/workflows/one-shot-project-isolation-test-fix.yml
          git config user.name "Founder Control Room Patch Bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/http/routes/__tests__/projects.releases-connections.integration.test.ts .github/workflows/one-shot-project-isolation-test-fix.yml
          git commit -m "Align connection integration proof with project-scoped writes"
          git push origin HEAD:fix/project-scoped-connection-write
