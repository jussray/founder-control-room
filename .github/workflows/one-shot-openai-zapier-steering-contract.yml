name: One-shot OpenAI Zapier steering contract

on:
  push:
    branches:
      - contract/openai-zapier-steering
    paths:
      - .github/workflows/one-shot-openai-zapier-steering-contract.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: contract/openai-zapier-steering
          fetch-depth: 0

      - name: Encode connector and credential steering boundaries
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_section(path: str, start: str, end: str, replacement: str) -> None:
              file = Path(path)
              text = file.read_text()
              start_index = text.find(start)
              end_index = text.find(end, start_index)
              if start_index < 0 or end_index < 0:
                  raise SystemExit(f'Could not find section markers in {path}: {start!r} -> {end!r}')
              file.write_text(text[:start_index] + replacement.rstrip() + '\n\n' + text[end_index:])

          contract = Path('docs/founder-signal-engine/openai-zapier-steering-contract.md')
          contract.parent.mkdir(parents=True, exist_ok=True)
          contract.write_text('''# OpenAI Developers and Zapier Steering Contract

## Goal

Allow connected ChatGPT, Codex, and OpenAI-backed agents to inspect, repair, test, and run the Founder Signal Engine Zapier workflow through explicit, least-privilege control paths.

## Core distinction

Zapier steering has two separate planes:

1. **Credential plane:** the dedicated OpenAI Platform key lets the OpenAI step inside Zapier call an approved model.
2. **Control plane:** a Zapier, OpenAI Developers, automation, browser-control, MCP, or equivalent connector lets an acting agent inspect or operate the Zapier workflow.

A configured Zapier OpenAI connection may use the dedicated key without exposing the raw key to the acting agent. Key possession alone is not a Zapier control surface. A connector alone does not prove that the OpenAI action is authenticated.

## Steering authority matrix

| Available path | Allowed steering | Proof limit |
|---|---|---|
| Scoped Zapier/control connector plus an active dedicated OpenAI connection | Inspect, edit, test, and run the controlled Day 2 Zap; repair trigger scope and field mappings; verify OpenAI output; create review-first Buffer and deal-associated HubSpot evidence. | Must retain exact run evidence and obey the 5W1H send gate. |
| Scoped Zapier/control connector without an active OpenAI connection | Inspect and repair non-OpenAI workflow structure and mappings. | Cannot claim the OpenAI step or full workflow passed. |
| Authorized dedicated OpenAI key access plus secure Zapier UI/control access | Configure or repair the Zapier OpenAI connection, then test through Zapier. | Raw key must remain outside logs, chat, screenshots, GitHub, HubSpot, and Control Room records. |
| Dedicated OpenAI key without Zapier connector or secure Zapier UI/control access | Validate OpenAI Platform target and key status only. | Cannot inspect, edit, test, or run Zapier directly. |
| Neither connector nor authorized key path | Provide exact manual UI steps and create a blocked-evidence record. | No direct-control or end-to-end claim. |

## Canonical Day 2 path

```text
GitHub evidence
-> Zapier trigger
-> dedicated OpenAI connection
-> OpenAI 5W1H send gate
-> Buffer draft or queue item only when allowed
-> HubSpot task or note associated with Founder Signal Engine
-> Founder Control Room evidence record
```

## Agent behavior

- Discover Zapier, OpenAI Developers, automation, browser-control, MCP, and equivalent connectors before falling back to manual instructions.
- Use a connector to steer Zapier only within its declared capabilities and project boundary.
- An agent does not need to see the raw key when Zapier already holds a working dedicated OpenAI connection.
- An agent authorized to configure the key must place it only into the secure Zapier/OpenAI connection surface.
- Prefer the dedicated `zapier-founder-signal-engine` key over a local Codex key.
- Do not reuse, reveal, copy, log, commit, screenshot, or place the raw key in CRM or evidence content.
- Do not treat successful OpenAI authentication as proof that the GitHub trigger, Buffer mapping, HubSpot association, or full Zap passed.
- Do not treat connector availability as permission to publish, send outreach, spend funds, alter commercial terms, or widen scopes.

## 5W1H send gate

Every OpenAI action must return:

```text
Who:
What:
Where:
When:
Why:
How:
Send decision: publish-draft, review-only, internal-only, or research-task
Missing proof or missing context:
```

If any field is incomplete, the workflow must not publish or send. It should create a deal-associated HubSpot research or review task and retain the blocked reason.

## Evidence contract

A full pass requires:

1. exact GitHub source evidence;
2. Zapier run ID and status;
3. OpenAI 5W1H output without credentials;
4. Buffer draft or queue evidence when the send decision permits it;
5. HubSpot task or note associated with deal `337185466050`;
6. Founder Control Room evidence linking the run to the source SHA;
7. no raw key in any retained artifact.

## Non-authority

This contract does not authorize blind publication, external outreach, key disclosure, credential reuse, billing changes, deployment, database migration, auth changes, deletion, or destructive provider actions.

## Rollback

Disable the Zap, disconnect or rotate the dedicated OpenAI connection, restore the prior Zap version, and mark downstream Buffer or HubSpot artifacts as invalidated. Never delete founder evidence merely to make the run look clean.
''')

          agents_path = Path('AGENTS.md')
          agents_text = agents_path.read_text()
          product_line = '- [`skills/product-design-gate/SKILL.md`](./skills/product-design-gate/SKILL.md) before Product Design audits, prototypes, visual QA, or design evidence claims\n'
          steering_line = '- [`OpenAI Developers and Zapier Steering Contract`](./docs/founder-signal-engine/openai-zapier-steering-contract.md) before inspecting, repairing, testing, or running Zapier through OpenAI-connected agents\n'
          if steering_line not in agents_text:
              if agents_text.count(product_line) != 1:
                  raise SystemExit('AGENTS product-design insertion point changed')
              agents_text = agents_text.replace(product_line, product_line + steering_line, 1)
              agents_path.write_text(agents_text)

          replace_section(
              'AGENTS.md',
              '## OpenAI Platform and Zapier key handoff',
              '## Product Design and Supabase truth',
              '''## OpenAI Developers and Zapier steering contract

Read [`docs/founder-signal-engine/openai-zapier-steering-contract.md`](docs/founder-signal-engine/openai-zapier-steering-contract.md) before steering Founder Signal Engine automation.

Zapier steering has two separate planes:

```text
Credential plane: a dedicated OpenAI Platform key authenticates the OpenAI step inside Zapier.
Control plane: a Zapier, OpenAI Developers, automation, browser-control, MCP, or equivalent connector operates the Zap.
```

The complete steering path is available when the acting agent has a scoped control path and Zapier has an active dedicated OpenAI connection. The agent does not need to see the raw key when Zapier already stores the working connection. Agents authorized to use the dedicated key may configure or validate the OpenAI action only through a secure Zapier connection. Key possession alone is not a Zapier control surface.

Canonical key intent:

```text
OpenAI Platform key name: zapier-founder-signal-engine
Purpose: allow Zapier to call OpenAI for Founder Signal Engine 5W1H analysis, draft generation, routing decisions, and review-task content.
Target: Ray's selected OpenAI Platform organization and project.
```

Agent steering rule:

```text
Goal: make the Day 2 workflow actually run.
Path: GitHub evidence -> Zapier -> OpenAI 5W1H -> Buffer draft/queue -> HubSpot deal-associated task/note -> Founder Control Room evidence.
Default: discover and use the scoped connector/control path before asking Ray to operate Zapier manually.
Fallback: provide exact Zapier UI steps only after confirming no usable control path exists.
```

Rules:

- Discover Zapier, OpenAI Developers, automation, browser-control, MCP, and equivalent connectors before declaring direct control unavailable.
- With a scoped Zapier/control connector and active dedicated OpenAI connection, inspect, repair, test, and run the controlled workflow.
- With a connector but no active OpenAI connection, repair non-OpenAI structure but do not claim an end-to-end pass.
- With authorized key access but no Zapier control path, validate the OpenAI target/key only; do not claim direct Zapier steering.
- Never ask Ray to paste the raw key into GitHub, HubSpot, Founder Control Room, PRs, issues, logs, screenshots, or chat-visible documentation.
- Never commit the key or reuse a local Codex key for Zapier without explicit founder choice.
- If the OpenAI step fails, verify the dedicated connection and key status before changing prompts or mappings.
- Buffer remains review-first. No connector, key, or successful test authorizes blind publishing.
- HubSpot tasks and notes must be associated with the `Founder Signal Engine` deal, not left floating.
- If the 5W1H block is incomplete, do not publish or send; create a deal-associated research or review task.

Correct workflow boundary:

```text
GitHub evidence
-> Zapier trigger
-> dedicated OpenAI connection
-> OpenAI 5W1H send gate
-> Buffer draft or queue item only when allowed
-> HubSpot task/note associated with Founder Signal Engine
-> Founder Control Room evidence record
```'''
          )

          replace_section(
              'docs/founder-signal-engine/day2-zapier-cockpit-runbook.md',
              '## Tool discovery rule',
              '## Zapier fix plan',
              '''## Tool discovery and steering rule

Before giving Ray manual Zapier UI steps, the acting agent must:

1. Check available tools/connectors for Zapier, OpenAI Developers, automation, browser-control, MCP, or equivalent workflow-control access.
2. Check whether Zapier already has an active dedicated OpenAI connection. The agent does not need the raw key when that connection is working.
3. If a usable control connector exists, inspect or repair the Zap directly within its declared capabilities.
4. If the connector exists but the OpenAI connection is unavailable, repair non-OpenAI structure but do not claim a full pass.
5. If authorized key access exists alongside secure Zapier UI/control access, configure the OpenAI connection without exposing the key.
6. If no usable control path exists, give Ray exact Zapier UI instructions and record that tool discovery blocked direct control.

Manual handoff is the fallback, not the default.

## OpenAI Developers connector and key boundary

OpenAI Platform is the credential/model layer. Zapier or an equivalent connector is the workflow-control layer.

```text
Credential plane: dedicated OpenAI key inside Zapier.
Control plane: Zapier/OpenAI Developers/automation/browser/MCP connector.
```

A full steering path requires both a scoped control path and an active OpenAI connection. Key possession alone is not a Zapier control surface. Connector availability alone does not prove the OpenAI action is authenticated.

Canonical key intent:

```text
OpenAI Platform key name: zapier-founder-signal-engine
Purpose: let Zapier call OpenAI for Founder Signal Engine 5W1H analysis, draft generation, routing decisions, and HubSpot review-task content.
```

Rules:

- Use OpenAI Platform to identify the correct org/project, validate key state, or start secure setup.
- Use Zapier or an equivalent control connector to inspect, edit, test, and run the workflow.
- Never expose the raw key in GitHub, HubSpot, Founder Control Room, PRs, issues, logs, screenshots, or chat-visible docs.
- Prefer a dedicated Zapier key over the local Codex `OPENAI_API_KEY`.
- Guide Ray to paste the key into Zapier only when the environment cannot securely complete the connection itself.
- If Zapier fails at the OpenAI step, first verify the dedicated connection and key are active.
- A successful OpenAI step does not prove the trigger, Buffer route, HubSpot association, or full Zap passed.

Known OpenAI Platform target from Day 2:

```text
Organization: Personal
Organization ID: org-TSqG9R1rPqx8uRdkbrXyxEdN
Project: Default project
Project ID: proj_OojryPqVk2W5IIifEGLy9M7B
```

Do not publish the raw key.
'''
          )

          replace_section(
              'docs/founder-signal-engine/day2-automation-blueprint.md',
              '## SOURCE OF TRUTH',
              '## 5W1H SEND GATE',
              '''## SOURCE OF TRUTH

- GitHub proof source: `jussray/Sekret-Bip`
- Project control source: `jussray/founder-control-room`
- CRM source: HubSpot Deal `Founder Signal Engine`
- Social queue: Buffer
- AI drafting layer: OpenAI Platform key connected inside Zapier
- Workflow control layer: scoped Zapier, OpenAI Developers, automation, browser-control, MCP, or equivalent connector

## STEERING AUTHORITY

The OpenAI key authenticates the OpenAI action. The connector operates the Zapier workflow. A configured Zapier OpenAI connection can be used without exposing the raw key to the acting agent. Key possession alone is not a Zapier control surface.

- Connector plus active dedicated OpenAI connection: inspect, repair, test, and run the controlled workflow.
- Connector without active OpenAI connection: repair structure, but do not claim OpenAI or end-to-end proof.
- Authorized key plus secure Zapier UI/control access: configure the connection, then test through Zapier.
- Key without Zapier control access: validate key/platform state only.
- Neither: exact manual UI handoff with a blocked-evidence record.

No steering path authorizes blind publication, outreach, spending, deployment, migration, or credential disclosure.
'''
          )

          blueprint = Path('docs/founder-signal-engine/day2-automation-blueprint.md')
          blueprint_text = blueprint.read_text()
          old_association = 'Associate manually with HubSpot Deal: `Founder Signal Engine` if Zapier exposes association fields. If not, leave the deal name in the task body.'
          new_association = 'Associate the task or note with HubSpot Deal `Founder Signal Engine` / `337185466050`. If the current connector cannot create the association, stop the pass and create a deal-associated repair task through the available HubSpot control path; do not count a floating task as completion.'
          if blueprint_text.count(old_association) != 1:
              raise SystemExit('Blueprint HubSpot association text changed')
          blueprint.write_text(blueprint_text.replace(old_association, new_association, 1))

          verifier = Path('scripts/verify-ai-skill-contract.mjs')
          verifier_text = verifier.read_text()
          read_anchor = "  productDesign: await readFile(new URL('../skills/product-design-gate/SKILL.md', import.meta.url), 'utf8'),\n"
          read_addition = "  zapierSteering: await readFile(new URL('../docs/founder-signal-engine/openai-zapier-steering-contract.md', import.meta.url), 'utf8'),\n  zapierRunbook: await readFile(new URL('../docs/founder-signal-engine/day2-zapier-cockpit-runbook.md', import.meta.url), 'utf8'),\n  zapierBlueprint: await readFile(new URL('../docs/founder-signal-engine/day2-automation-blueprint.md', import.meta.url), 'utf8'),\n"
          if read_addition not in verifier_text:
              if verifier_text.count(read_anchor) != 1:
                  raise SystemExit('Verifier file-read anchor changed')
              verifier_text = verifier_text.replace(read_anchor, read_anchor + read_addition, 1)

          check_anchor = "requireText('AGENTS portfolio entry', files.agents, 'skills/portfolio-control-plane/SKILL.md');\n"
          checks = '''for (const phrase of [
  'Credential plane',
  'Control plane',
  'Key possession alone is not a Zapier control surface',
  'does not need to see the raw key',
  'HubSpot task or note associated with deal `337185466050`',
  'No direct-control or end-to-end claim',
]) requireText('OpenAI Zapier steering invariant', files.zapierSteering, phrase);
for (const phrase of [
  'OpenAI Developers connector and key boundary',
  'Key possession alone is not a Zapier control surface',
  'A successful OpenAI step does not prove',
]) requireText('Zapier runbook invariant', files.zapierRunbook, phrase);
for (const phrase of [
  '## STEERING AUTHORITY',
  'Key possession alone is not a Zapier control surface',
  'do not count a floating task as completion',
]) requireText('Zapier blueprint invariant', files.zapierBlueprint, phrase);

'''
          if checks not in verifier_text:
              if verifier_text.count(check_anchor) != 1:
                  raise SystemExit('Verifier AGENTS anchor changed')
              verifier_text = verifier_text.replace(check_anchor, checks + check_anchor, 1)

          agent_checks_anchor = "requireText('AGENTS Product Design entry', files.agents, 'skills/product-design-gate/SKILL.md');\n"
          agent_checks = "requireText('AGENTS Zapier steering entry', files.agents, 'openai-zapier-steering-contract.md');\nrequireText('AGENTS Zapier control distinction', files.agents, 'Key possession alone is not a Zapier control surface');\n"
          if agent_checks not in verifier_text:
              if verifier_text.count(agent_checks_anchor) != 1:
                  raise SystemExit('Verifier AGENTS Product Design anchor changed')
              verifier_text = verifier_text.replace(agent_checks_anchor, agent_checks_anchor + agent_checks, 1)
          verifier.write_text(verifier_text)
          PY

          rm .github/workflows/one-shot-openai-zapier-steering-contract.yml

          git config user.name "Founder Control Room Contract Bot"
          git config user.email "actions@users.noreply.github.com"
          git add AGENTS.md docs/founder-signal-engine/openai-zapier-steering-contract.md docs/founder-signal-engine/day2-zapier-cockpit-runbook.md docs/founder-signal-engine/day2-automation-blueprint.md scripts/verify-ai-skill-contract.mjs .github/workflows/one-shot-openai-zapier-steering-contract.yml
          git commit -m "Define OpenAI connector and Zapier steering authority"
          git push origin HEAD:contract/openai-zapier-steering
