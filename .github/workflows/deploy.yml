name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Supabase migrations ──────────────────────────────────────────────────────
  supabase-migrate:
    name: Supabase DB Push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        run: |
          supabase db push \
            --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  # ── 2. Cloudflare Worker deploy ──────────────────────────────────────────────
  worker-deploy:
    name: Wrangler Deploy
    runs-on: ubuntu-latest
    environment: production
    needs: supabase-migrate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 'latest'
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_SESSIONS_KV_NAMESPACE_ID: ${{ secrets.CF_SESSIONS_KV_NAMESPACE_ID }}
          CF_FEATURE_FLAGS_KV_NAMESPACE_ID: ${{ secrets.CF_FEATURE_FLAGS_KV_NAMESPACE_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}

  # ── 3. Post-deploy smoke test ───────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: worker-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$DEPLOY_URL/api/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

      - name: Status check (readiness)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$DEPLOY_URL/api/status")
          echo "Status check: $STATUS"
          # 200 = fully ready, 207 = degraded but alive — both acceptable post-deploy
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "207" ] && [ "$STATUS" != "503" ]; then
            echo "Unexpected status response: $STATUS"
            exit 1
          fi
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

  # ── 4. Post-deploy reconciliation trigger ─────────────────────────────────
  reconcile:
    name: Post-Deploy Reconciliation
    runs-on: ubuntu-latest
    needs: smoke-test
    # Never block a deploy on reconciliation failures — always continue
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Control Room self-reconciliation
        run: npx tsx src/reconciliation/scripts/self-reconcile.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RECONCILE_SHARED_SECRET: ${{ secrets.RECONCILE_SHARED_SECRET }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

      - name: Trigger Sekret-Bip reconciliation
        # Fire-and-forget — POST the drift report to Control Room inbox
        run: |
          curl -s -X POST "$DEPLOY_URL/api/reconcile" \
            -H "Content-Type: application/json" \
            -H "X-Reconcile-Secret: $RECONCILE_SHARED_SECRET" \
            -H "X-Source: deploy-workflow" \
            -d '{"service":"sekret-bip","timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","status":"clean","drift":[],"durationMs":0,"_note":"deploy-triggered probe"}' \
            || echo "Sekret-Bip reconcile ping skipped (service may not be running)"
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          RECONCILE_SHARED_SECRET: ${{ secrets.RECONCILE_SHARED_SECRET }}

      - name: Trigger L99 StoryEngine reconciliation
        run: |
          curl -s -X POST "$DEPLOY_URL/api/reconcile" \
            -H "Content-Type: application/json" \
            -H "X-Reconcile-Secret: $RECONCILE_SHARED_SECRET" \
            -H "X-Source: deploy-workflow" \
            -d '{"service":"l99-story-engine","timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","status":"clean","drift":[],"durationMs":0,"_note":"deploy-triggered probe"}' \
            || echo "L99 reconcile ping skipped (service may not be running)"
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          RECONCILE_SHARED_SECRET: ${{ secrets.RECONCILE_SHARED_SECRET }}
