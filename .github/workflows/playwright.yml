name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Make E2E harness use Playwright browser discovery
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('e2e/run.mjs')
          source = path.read_text()
          source = source.replace(
              "const CHROME_PATH = '/opt/pw-browsers/chromium-1194/chrome-linux/chrome';",
              "const CHROME_PATH = process.env.CHROME_PATH;",
          )
          source = source.replace(
              "const browser = await chromium.launch({ executablePath: CHROME_PATH, headless: true, args: ['--no-sandbox'] });",
              "const browser = await chromium.launch({ ...(CHROME_PATH ? { executablePath: CHROME_PATH } : {}), headless: true, args: ['--no-sandbox'] });",
          )
          path.write_text(source)
          PY
          grep -n "CHROME_PATH\|chromium.launch" e2e/run.mjs

      - name: Run E2E harness
        shell: bash
        run: |
          mkdir -p logs
          set +e
          npm run test:e2e 2>&1 | tee logs/e2e.log
          status=${PIPESTATUS[0]}
          echo "E2E harness exit status: ${status}" | tee -a logs/e2e.log
          exit "${status}"
        env:
          NODE_ENV: test
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload traces and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: logs/
          if-no-files-found: ignore
          retention-days: 30
