name: Regenerate lockfile

on:
  push:
    branches:
      - fix/proof-gate-followups

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/proof-gate-followups
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Regenerate package-lock.json
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit regenerated lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: regenerate package-lock"
          git push origin HEAD:fix/proof-gate-followups
