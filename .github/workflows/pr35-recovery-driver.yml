name: PR35 Recovery Exact-Head Driver

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  TARGET_SHA: a91c001bed76fb97700b568f0daa5eea4e382dba
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  target-metadata:
    name: Exact Target Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - name: Assert immutable target
        shell: bash
        run: |
          observed="$(git rev-parse HEAD)"
          echo "target_sha=$TARGET_SHA"
          echo "observed_sha=$observed"
          test "$observed" = "$TARGET_SHA"

  typecheck:
    name: Target Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Target Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: Target Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm test -- --coverage --reporter=json --outputFile=driver-test-results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr35-recovery-driver-test-results
          path: driver-test-results.json
          if-no-files-found: error
          retention-days: 7

  terminal-contract:
    name: Target Terminal and AI Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run verify:terminal-contract
      - run: npm run verify:ai-skills

  build:
    name: Target Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build

  migration-lint:
    name: Target Migration Lint Evidence
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase db lint --local
