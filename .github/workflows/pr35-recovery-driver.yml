name: PR35 Recovery Exact-Head Driver

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  TARGET_SHA: 494a8cca2b5ffa284134353104498302aa32de0c
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  target-metadata:
    name: Exact Target Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - name: Assert immutable target
        shell: bash
        run: |
          observed="$(git rev-parse HEAD)"
          echo "target_sha=$TARGET_SHA"
          echo "observed_sha=$observed"
          test "$observed" = "$TARGET_SHA"

  typecheck:
    name: Target Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Run typecheck with retained diagnostics
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr35-recovery-typecheck-log
          path: typecheck.log
          if-no-files-found: error
          retention-days: 7

  lint:
    name: Target Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Run lint with retained diagnostics
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr35-recovery-lint-log
          path: lint.log
          if-no-files-found: error
          retention-days: 7

  unit-tests:
    name: Target Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Run unit tests with retained diagnostics
        shell: bash
        run: |
          set -o pipefail
          npm test -- --coverage --reporter=json --outputFile=driver-test-results.json 2>&1 | tee unit-tests.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr35-recovery-unit-test-diagnostics
          path: |
            unit-tests.log
            driver-test-results.json
          if-no-files-found: warn
          retention-days: 7

  terminal-contract:
    name: Target Terminal and AI Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run verify:terminal-contract
      - run: npm run verify:ai-skills

  build:
    name: Target Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Run production build with retained diagnostics
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr35-recovery-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 7

  migration-lint:
    name: Target Migration Lint Evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
      - run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local database and lint migrations
        shell: bash
        run: |
          set -o pipefail
          {
            test -f supabase/config.toml || supabase init
            supabase db start
            supabase db lint --local --fail-on error
          } 2>&1 | tee migration-lint.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr35-recovery-migration-lint-log
          path: migration-lint.log
          if-no-files-found: error
          retention-days: 7
      - name: Stop local database
        if: always()
        run: supabase stop --no-backup
