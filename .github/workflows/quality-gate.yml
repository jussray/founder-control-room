name: Quality Gate

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm test -- --coverage --reporter=json --outputFile=test-results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.json
          if-no-files-found: warn

  qodo-contracts:
    name: Qodo – Workflow Contract Tests
    runs-on: ubuntu-latest
    env:
      QODO_API_KEY: ${{ secrets.QODO_API_KEY }}
    steps:
      - name: Explain skipped gate
        if: env.QODO_API_KEY == ''
        run: echo "Qodo gate skipped because QODO_API_KEY is not configured."
      - uses: actions/checkout@v4
        if: env.QODO_API_KEY != ''
      - uses: actions/setup-node@v4
        if: env.QODO_API_KEY != ''
        with:
          node-version: '20'
      - if: env.QODO_API_KEY != ''
        run: npm install --no-audit --no-fund
      - name: Run Qodo tests
        if: env.QODO_API_KEY != ''
        run: npx qodo test --coverage --reporter=json --output=qodo-results.json
      - name: Evaluate Qodo gate
        if: env.QODO_API_KEY != ''
        run: |
          node -e "
            const r = require('./qodo-results.json');
            const failed = r.failures ?? [];
            const contracts = r.contractViolations ?? [];
            if (failed.length > 0 || contracts.length > 0) {
              console.error('Qodo gate failed:');
              [...failed, ...contracts].forEach(f => console.error(' •', f.message));
              process.exit(1);
            }
            console.log('Qodo gate passed.');
          "
      - uses: actions/upload-artifact@v4
        if: env.QODO_API_KEY != '' && always()
        with:
          name: qodo-results
          path: qodo-results.json
          if-no-files-found: warn

  sonarqube:
    name: SonarQube – Orchestrator Latency Safe
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Explain skipped gate
        if: env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == ''
        run: echo "SonarQube gate skipped because its secrets are not configured."
      - uses: actions/checkout@v4
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        with:
          node-version: '20'
      - if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        run: npm install --no-audit --no-fund
      - name: SonarQube Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@master
        with:
          args: >
            -Dsonar.projectKey=founder-control-room
            -Dsonar.qualitygate.wait=true
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
